spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: publicaciones
              uri: lb://publicaciones
              predicates:
                - Path=/alojate/publicaciones/**, /alojate/multimedia/**, /alojate/favoritos/** , /alojate/favoritos
              filters:
                - RewritePath=/alojate/publicaciones(?<segment>.*), /api/publicaciones${segment}
                - RewritePath=/alojate/multimedia(?<segment>.*), /api/multimedia${segment}
                - RewritePath=/alojate/favoritos(?<segment>.*), /api/favoritos${segment}
            - id: reservas
              uri: lb://reservas
              predicates:
                - Path=/alojate/reservas/**, /images/**
              filters:
                - RewritePath=/alojate/reservas(?<segment>.*), /api/reservas${segment}
            - id: usuarios
              uri: lb://usuarios
              predicates:
                - Path=/alojate/usuarios/**
              filters:
                - RewritePath=/alojate/usuarios(?<segment>.*), /api/usuarios${segment}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-h3xrizjs1bocf38m.us.auth0.com/
          audiences: https://localhost:8080
auth0:
  audience: https://localhost:8080
server:
  port: 8080
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: TRACE
    reactor.netty: DEBUG

