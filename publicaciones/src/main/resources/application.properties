# Configuracion de Servicio de autenticacion
#auth.service.url=http://localhost:8083/api

spring.test.context.cache.maxSize=32
spring.test.context.cache.mode=PER_CLASS

logging.level.root=INFO
logging.level.__tpa_mi_no_grupo_07=DEBUG 

jakarta.persistence.jdbc.url=jdbc:mysql://localhost:3306/aloj_publicaciones?useSSL=false&createDatabaseIfNotExist=true&AllowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/aloj_publicaciones?useSSL=false&createDatabaseIfNotExist=true&AllowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# ? Desactivar logs SQL de Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ? Apagar logs de SQL y bindings
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# ?? Solo errores de Hibernate
logging.level.org.hibernate=ERROR

# Dialecto
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuraci?n del seeder
app.seeder.limpiar_bd=true


######################################
#           RATE LIMITING            #
######################################

ratelimit.capacity=100

# Tokens que se regeneran por minuto
ratelimit.refill-per-minute=100